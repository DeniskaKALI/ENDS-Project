server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-store-type: PKCS12

spring:
  application:
    name: progile-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/progile}
    username: ${DB_USERNAME:progile}
    password: ${DB_PASSWORD:progile}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "progile-course-project-secret-key-2026-minimum-32-bytes"
    expiration-minutes: 240

springdoc:
  swagger-ui:
    path: /swagger-ui.html
